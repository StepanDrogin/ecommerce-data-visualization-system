services:
  - type: web
    name: edvs-backend
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm ci --include=dev && npm run build -w @edvs/shared && npm run prisma:generate -w @edvs/backend && npm run build -w @edvs/backend
    startCommand: npm run prisma:migrate -w @edvs/backend && npm run prisma:seed -w @edvs/backend && npm run start -w @edvs/backend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://edvs-frontend.onrender.com
      - key: FRONTEND_URLS
        value: https://edvs-frontend.onrender.com
      - key: ALLOW_RENDER_SUBDOMAINS
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: edvs-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: edvs-redis
          property: connectionString

  - type: web
    name: edvs-frontend
    runtime: static
    plan: free
    buildCommand: npm ci --include=dev && npm run build -w @edvs/shared && npm run build -w @edvs/frontend
    staticPublishPath: apps/frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://edvs-backend.onrender.com

  - type: keyvalue
    name: edvs-redis
    plan: free
    region: frankfurt
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

databases:
  - name: edvs-postgres
    plan: basic-256mb
    region: frankfurt
    databaseName: ecommerce_visualization
    user: ecommerce
    postgresMajorVersion: "17"
